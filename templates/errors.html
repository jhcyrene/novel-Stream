{% extends "base.html" %}

{% block title %}Something Went Wrong{% endblock %}

{% block content %}
<div style="text-align: center; padding: 100px 20px;">
    <h1 style="font-size: 4rem; color: var(--primary-color);">Oops!</h1>
    <h2>{{ error_title if error_title else "Something went wrong." }}</h2>
    <p style="color: #666; margin-bottom: 30px;">
        {{ error_message if error_message else "An unexpected error occurred. Please try again later." }}
    </p>
    <a href="{{ url_for('main.home') }}" class="btn-primary" style="padding: 10px 20px; text-decoration: none;">
        Return to Home
    </a>
</div>
{% endblock %}
